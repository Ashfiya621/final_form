<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="form">Forms</h2>
    <form action="" method="get">
    <label for="username">USERNAME:</label>
    <input type="text" id="username" name="username"  autocomplete="on" required><br><br>

    <label for="email">EMAIL:</label>
    <input type="email" autocomplete="on" required><br><br>

    <label for="password">PASSWORD:</label>
    <input type="password" autocomplete="on" required><br><br>

    <input type="submit"><br><br>

    <label for="">SKILLS:</label>
    <input type="checkbox">HTML
    <input type="checkbox">C
    <input type="checkbox">PYTHON<br><br>

    <label for="">Button</label>
    <input type="button" value="button">

    <label for="">gender</label>
    <input type="radio"><br><br>

    <label for="">Color</label>
    <input type="color"><br><br>

    <input type="image">
    <input type="url"><br><br>

    <label for="">File</label>
    <input type="file"><br><br>

    <label for="">search</label>
    <input type="search"><br><br>

    <label for="">Phone Number</label>
    <input type="tel"><br><br>

    <label for="">Date</label>
    <input type="date"><br><br>

    <label for="">Time</label>
    <input type="time"><br><br>

    <label for="">Date&Time</label>
    <input type="datetime-local"><br><br>

    <input type="reset">
    <input type="submit">
     
   </form>
    
</body>
</html>
